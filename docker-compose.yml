name: connexity

# development environment

services:

  # Todo: improve frontend and test it
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: connexity-frontend
    restart: unless-stopped
    ports:
      - 3000:3000
    depends_on:
      - backend
    networks:
      - default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: connexity-backend
    restart: unless-stopped
    # don't mount alembic as volume
    ports:
      - 8000:8000
    env_file:
      - .env
    environment:
      # Override: inside Docker network, DB is at service name, not localhost
      - POSTGRES_SERVER=database
      - POSTGRES_PORT=5432
    depends_on:
      - database
    networks:
      - default

  database:
    image: postgres:17.5-alpine3.22
    container_name: connexity-database
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    # postgres user 999:999 must own the volume
    # ok in dev, python watch will complain
    # user: '${MY_UID}:${MY_GID}'  # Linux only, not needed on Windows/macOS
    ports:
      - '${POSTGRES_PORT}:5432'
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    volumes:
      - ./backend/data/database:/var/lib/postgresql/data # !without /pgdata
    networks:
      - default

  # pgweb — zero-login Postgres browser for dev. Service name kept as `adminer`
  # so existing docs/scripts (e.g. CLAUDE.md) still compose up.
  adminer:
    image: sosedoff/pgweb:latest
    container_name: connexity-adminer
    restart: unless-stopped
    depends_on:
      - database
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - 8083:8081
    networks:
      - default

networks:
  default:
    driver: bridge
