name: connexity

# GHCR images by default; use docker-compose.build.yml to build locally.

services:
  frontend:
    image: ${CONNEXITY_FRONTEND_IMAGE:-ghcr.io/connexity-ai/connexity-frontend:latest}
    container_name: connexity-frontend
    restart: unless-stopped
    ports:
      - 3000:3000
    depends_on:
      - backend
    networks:
      - default
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_URL: http://backend:8000
      SITE_URL: ${SITE_URL?Variable not set}

  backend:
    image: ${CONNEXITY_BACKEND_IMAGE:-ghcr.io/connexity-ai/connexity-backend:latest}
    container_name: connexity-backend
    restart: unless-stopped
    ports:
      - 8000:8000
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: database
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Variable not set}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - default

  database:
    image: postgres:17.5-alpine3.22
    container_name: connexity-database
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}",
        ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Variable not set}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - ./backend/data/database:/var/lib/postgresql/data
    networks:
      - default

  # pgweb (service name `adminer` for existing docs/scripts)
  adminer:
    image: sosedoff/pgweb:latest
    container_name: connexity-adminer
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-app}?sslmode=disable
    ports:
      - 8083:8081
    networks:
      - default

networks:
  default:
    driver: bridge
