name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Backend: lint + typecheck ──────────────────────────────
  backend-lint:
    name: "Backend · Lint & Types"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --group dev --frozen

      - name: Ruff check
        run: uv run ruff check --output-format github app cli scripts
        env:
          RUFF_OUTPUT_FORMAT: github

      - name: Ruff format check
        run: uv run ruff format --check app cli scripts

      - name: Pyright
        run: uv run pyright

  # ── Backend: tests + coverage ──────────────────────────────
  backend-test:
    name: "Backend · Tests"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --group dev --frozen

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: |
          uv run coverage run --source=app -m pytest -v
          uv run coverage report --show-missing --fail-under=90

  # ── Frontend: lint + typecheck ─────────────────────────────
  frontend-lint:
    name: "Frontend · Lint & Types"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm turbo lint --filter=connexity-evals

      - name: TypeScript typecheck
        run: pnpm turbo typecheck

  # ── Client codegen freshness check ─────────────────────────
  client-codegen:
    name: "Client · Codegen Freshness"
    runs-on: ubuntu-latest
    env:
      # Dummy values so app.main can be imported for OpenAPI extraction
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd backend && uv venv && uv sync --frozen
          cd ../frontend && pnpm install --frozen-lockfile

      - name: Regenerate client and check for diff
        run: |
          bash scripts/generate-client.sh
          if ! git diff --exit-code frontend/apps/web/src/client/; then
            echo "::error::Client codegen is out of date. Run 'bash scripts/generate-client.sh' and commit the changes."
            exit 1
          fi
