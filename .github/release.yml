# Configures the auto-generated release notes used by `gh release create --generate-notes`
# (and the GitHub web UI's "Generate release notes" button). Used by the platform release
# workflow (release-platform.yml). The CLI release workflow uses release-please, which
# generates its own notes from the CHANGELOG and ignores this file.
changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
    authors:
      - dependabot
      - github-actions
  categories:
    - title: ⚠️ Breaking Changes
      labels:
        - breaking-change
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🧰 Maintenance
      labels:
        - chore
        - refactor
        - test
        - ci
    - title: Other Changes
      labels:
        - "*"
